<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방재실 대시보드 | 열교환기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f7fa;--card:#fff;--bdr:#e2e8f0;--bdr2:#cbd5e1;
  --c1:#1d6fce;--c2:#c47c0a;--c3:#0d7a50;--c4:#6d3fc0;
  --txt:#1a202c;--txt2:#4a5568;--txt3:#94a3b8;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:13px}

#topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  padding:11px 20px;background:#fff;border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tl{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:var(--c1);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ttitle{font-size:15px;font-weight:700;color:var(--c1)}
.tsub{font-size:11px;color:var(--txt2);margin-top:1px}
.tr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#dateBadge{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--c1);
  background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 11px}
.btn-up{background:var(--c1);border:none;border-radius:7px;padding:6px 15px;
  color:#fff;font-weight:700;font-size:12px;cursor:pointer;transition:background .15s}
.btn-up:hover{background:#1558a8}
#fi{display:none}
.btn-tr{background:#fff;border:1.5px solid #86efac;border-radius:7px;
  padding:6px 13px;color:var(--c3);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-tr:hover,.btn-tr.on{background:#f0fdf4}
#main{padding:16px 18px 48px;max-width:1200px;margin:0 auto}


/* 감시 카드 */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
@media(max-width:720px){.mgrid{grid-template-columns:repeat(2,1fr)}}
.mcard{background:#fff;border:1px solid var(--bdr);border-radius:14px;
  padding:14px 16px;cursor:pointer;transition:all .18s;
  position:relative;overflow:hidden;box-shadow:var(--sh)}
.mcard::after{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:var(--ac);border-radius:14px 14px 0 0}
.mcard:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1);border-color:var(--ac)}
.mn{font-size:11px;color:var(--txt2);font-weight:500;margin-bottom:10px;
  display:flex;align-items:center;gap:6px}
.mbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
  background:var(--acbg);color:var(--ac)}
.mvals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.mv{text-align:center;padding:8px 4px;background:var(--bg);border-radius:8px}
.mv .lbl{font-size:9px;color:var(--txt3);margin-bottom:3px}
.mv .num{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--txt);line-height:1}
.mv .unt{font-size:9px;color:var(--txt2);margin-top:1px}
.mhint{position:absolute;bottom:7px;right:9px;font-size:9px;color:var(--txt3)}
.mcard:hover .mhint{color:var(--ac)}

/* 누적 추이 */
#trendSec{display:none;background:#fff;border:1px solid var(--bdr);
  border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--sh)}
#trendSec.show{display:block}
.th2{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.tt{font-size:13px;font-weight:700;color:var(--txt)}
.tnav{display:flex;align-items:center;gap:8px}
.tnav-btn{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;
  color:var(--txt2);font-size:14px;cursor:pointer;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.tnav-btn:hover{border-color:var(--c1);color:var(--c1);background:#eff6ff}
.tnav-btn:disabled{opacity:.3;cursor:default}
.tnav-range{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--c1);
  background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 11px}
.tleg{display:flex;gap:12px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)}
.ld{width:10px;height:10px;border-radius:50%}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.tgrid{grid-template-columns:1fr}}
.twrap{height:165px;position:relative}
.tlbl{font-size:11px;color:var(--txt2);margin-bottom:6px;font-weight:600}

/* 모달 */
#modal{display:none;position:fixed;inset:0;z-index:500;
  background:rgba(15,23,42,.35);backdrop-filter:blur(4px);overflow-y:auto}
#modal.show{display:flex;align-items:flex-start;justify-content:center;padding:24px 14px}
.mbox{background:#fff;border:1px solid var(--bdr);border-radius:18px;
  width:100%;max-width:840px;padding:24px;
  box-shadow:0 12px 48px rgba(0,0,0,.14);animation:su .2s ease}
@keyframes su{from{transform:translateY(18px);opacity:0}to{transform:none;opacity:1}}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.mhd-l{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mtitle{font-size:16px;font-weight:700;color:var(--txt)}
.date-nav{display:flex;align-items:center;gap:5px;position:relative}
.darr{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;
  color:var(--txt2);font-size:13px;cursor:pointer;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.darr:hover{border-color:var(--c1);color:var(--c1);background:#eff6ff}
.darr:disabled{opacity:.3;cursor:default}
#calBtn{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--c1);
  background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;
  padding:4px 12px;cursor:pointer;transition:all .15s;white-space:nowrap}
#calBtn:hover{background:#dbeafe;border-color:#93c5fd}
#calPop{display:none;position:absolute;top:36px;left:0;z-index:700;
  background:#fff;border:1px solid #bfdbfe;border-radius:14px;
  padding:14px;box-shadow:0 10px 36px rgba(0,0,0,.13);min-width:236px}
#calPop.show{display:block}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-month{font-size:13px;font-weight:700;color:var(--txt)}
.cal-nav{background:none;border:none;color:var(--txt3);font-size:14px;cursor:pointer;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;transition:all .12s}
.cal-nav:hover{background:#eff6ff;color:var(--c1)}
.cal-nav:disabled{opacity:.3;cursor:default}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:10px;color:var(--txt3);padding:4px 0;font-weight:700}
.cal-dow:first-child{color:#ef4444}.cal-dow:last-child{color:#3b82f6}
.cal-day{text-align:center;font-size:12px;padding:6px 2px;border-radius:7px;
  cursor:default;color:#cbd5e1;font-family:'JetBrains Mono',monospace;line-height:1}
.cal-day.has-data{cursor:pointer;color:var(--txt);background:#f8fafc;transition:background .12s}
.cal-day.has-data:hover{background:#dbeafe;color:var(--c1)}
.cal-day.selected{background:var(--c1)!important;color:#fff!important;font-weight:700}
.cal-day.today{outline:2px solid #86efac;outline-offset:-2px}
.cal-day.sun.has-data{color:#ef4444}.cal-day.sat.has-data{color:#3b82f6}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--c1);margin:2px auto 0;opacity:0}
.cal-day.has-data .cal-dot{opacity:1}.cal-day.selected .cal-dot{background:rgba(255,255,255,.6)}
.mcls{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;
  color:var(--txt2);font-size:18px;cursor:pointer;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.mcls:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.mkgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
@media(max-width:500px){.mkgrid{grid-template-columns:repeat(2,1fr)}}
.mkpi{background:var(--bg);border-radius:10px;padding:13px 10px;
  text-align:center;border:1px solid var(--bdr)}
.mkpi .ml{font-size:10px;color:var(--txt2);margin-bottom:4px;font-weight:500}
.mkpi .mv2{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.mkpi .ms{font-size:10px;color:var(--txt3);margin-top:3px}
.mcgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:500px){.mcgrid{grid-template-columns:1fr}}
.mcwrap{height:165px;position:relative}
.mclbl{font-size:11px;color:var(--txt2);margin-bottom:6px;font-weight:600}

.footer{text-align:center;color:var(--txt3);font-size:10px;
  padding-top:16px;border-top:1px solid var(--bdr)}

/* 로딩 점 애니메이션 */
40%{opacity:1}}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
</style>
</head>

<div id="topbar">
  <div class="tl">
    <div class="logo">🌡️</div>
    <div>
      <div class="ttitle">열교환기 모니터링</div>
      <div class="tsub">현대 테라타워 향동</div>
    </div>
  </div>
  <div class="tr">
    <div id="dateBadge">--</div>
        <button class="btn-tr on" id="btnTr" onclick="toggleTrend()">📈 누적 추이</button>
    <label class="btn-up" for="fi">📂 업데이트</label>
    <input type="file" id="fi" accept=".xls,.xlsx" multiple>
  </div>
</div>

<div id="main">
  <div class="mgrid" id="mgrid"></div>

  <div id="trendSec" class="show">
    <div class="th2">

      <div><div class="tlbl">난방 공급압력 (kgf)</div><div class="twrap"><canvas id="tcP"></canvas></div></div>

  </div>

  <div class="footer">현대 테라타워 향동 방재실 · 열교환기 대시보드 v3.2 · 2026.03 데이터 내장</div>
</div>

<!-- 모달 -->
<div id="modal" onclick="closeModalBg(event)">
  <div class="mbox">
    <div class="mhd">
      <div class="mhd-l">
        <div class="mtitle" id="mtitle">--</div>
        <div class="date-nav">
          <button class="darr" id="dPrev" onclick="navDate(-1)">◀</button>
          <button id="calBtn" onclick="toggleCal(event)">--</button>
          <button class="darr" id="dNext" onclick="navDate(1)">▶</button>
          <div id="calPop">
            <div class="cal-header">
              <button class="cal-nav" id="calPrevM" onclick="shiftCalMonth(-1)">◀</button>
              <div class="cal-month" id="calMonthLabel">--</div>
              <button class="cal-nav" id="calNextM" onclick="shiftCalMonth(1)">▶</button>
            </div>
            <div class="cal-grid" id="calGrid"></div>
          </div>
        </div>
      </div>
      <button class="mcls" onclick="closeModal()">✕</button>
    </div>
    <div class="mkgrid" id="mkpi"></div>
    <div class="mcgrid">
      <div><div class="mclbl">중온수 공급/환수 온도</div><div class="mcwrap"><canvas id="mcJ"></canvas></div></div>
      <div><div class="mclbl">난방 공급/환수 온도</div><div class="mcwrap"><canvas id="mcN"></canvas></div></div>
      <div><div class="mclbl">급탕 공급/환수 온도</div><div class="mcwrap"><canvas id="mcG"></canvas></div></div>
      <div><div class="mclbl">난방 압력</div><div class="mcwrap"><canvas id="mcP"></canvas></div></div>
    </div>
  </div>
</div>

    r.onload=ev=>{
      try{
        const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        res(parseRaw(raw));
      }catch(e){res(null);}
    };
    r.readAsArrayBuffer(file);
  });
}
function parseRaw(raw){
  const row2=raw[2]||[];
  const dv=row2.find(v=>typeof v==='number'&&v>40000);
  if(!dv)return null;
  const d=new Date(Math.round((dv-25569)*86400*1000));
  const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const dr=raw.slice(7,31).filter(r=>typeof r[0]==='number'&&r[0]>0.9&&r[0]<2.1);
  const hours=dr.map(r=>{const h=Math.round((r[0]-Math.floor(r[0]))*24)%24;return String(h).padStart(2,'0')+':00';});
  const st={};
  for(let r=0;r<raw.length;r++){
    const v=raw[r][0];
    if(v==='최소값')st.min=raw[r];
    else if(v==='최대값')st.max=raw[r];
    else if(v==='평균값')st.avg=raw[r];
  }
  if(!st.avg)return null;
  const sf=(row,i)=>{try{return parseFloat(row[i])||0;}catch{return 0;}};
  const col=(rows,o,c)=>rows.map(r=>sf(r,o+c));
  return{date:ds,devices:[1,9,17,25].map((o,i)=>({
    badge:DM[i].badge,hours,
    jungon_sup:col(dr,o,0),jungon_ret:col(dr,o,1),
    nanbang_sup:col(dr,o,2),nanbang_ret:col(dr,o,3),
    pres_sup:col(dr,o,4),pres_ret:col(dr,o,5),
    geuptang_sup:col(dr,o,6),geuptang_ret:col(dr,o,7),
    avg_jungon:+sf(st.avg,o).toFixed(2),avg_nanbang:+sf(st.avg,o+2).toFixed(2),
    avg_geuptang:+sf(st.avg,o+6).toFixed(2),
    avg_pres:+(col(dr,o,4).reduce((a,b)=>a+b,0)/Math.max(dr.length,1)).toFixed(2),
    min_jungon:sf(st.min,o),max_jungon:sf(st.max,o),
    min_nanbang:sf(st.min,o+2),max_nanbang:sf(st.max,o+2),
    min_geuptang:sf(st.min,o+6),max_geuptang:sf(st.max,o+6),
  }))};
}

/* ── 렌더 ── */
function renderAll(){
  document.getElementById('dateBadge').textContent=latest.date;
  renderMonitor();
  if(trendOn)renderTrend();
}

function renderMonitor(){
  document.getElementById('mgrid').innerHTML=latest.devices.map((d,i)=>{
    const m=DM[i];
    return `<div class="mcard" style="--ac:${m.color};--acbg:${m.bg}" onclick="openModal(${i})">
      <div class="mn">
        <span class="mbadge" style="background:${m.bg};color:${m.tc}">${m.badge}</span>
        <span style="color:${m.tc}">${m.name}</span>
      </div>
      <div class="mvals">
        <div class="mv"><div class="lbl">중온수공급</div>
          <div class="num">${d.avg_jungon.toFixed(1)}</div><div class="unt">°C</div></div>
        <div class="mv"><div class="lbl">난방공급</div>
          <div class="num">${d.avg_nanbang.toFixed(1)}</div><div class="unt">°C</div></div>
        <div class="mv"><div class="lbl">급탕공급</div>
          <div class="num">${d.avg_geuptang.toFixed(1)}</div><div class="unt">°C</div></div>
      </div>
      <div class="mhint">상세보기 ▶</div>
    </div>`;
  }).join('');
}

/* ── 누적 추이 ── */
function getTrendWindow(){
  const t=days.length,e=t+trendOffset*WINDOW;
  return days.slice(Math.max(0,e-WINDOW),e);
}
function shiftTrend(dir){
  const t=days.length,no=trendOffset+dir,e=t+no*WINDOW;
  if(e<=0||e-WINDOW>=t)return;
  trendOffset=no;renderTrend();
}
function toggleTrend(){
  trendOn=!trendOn;
  document.getElementById('btnTr').classList.toggle('on',trendOn);
  document.getElementById('trendSec').classList.toggle('show',trendOn);
  if(trendOn)renderTrend();
}
function renderTrend(){
  const win=getTrendWindow();if(!win.length)return;
  const dates=win.map(d=>d.date.slice(5));
  document.getElementById('tRange').textContent=`${win[0].date.slice(5)} ~ ${win[win.length-1].date.slice(5)}`;
  const t=days.length,e=t+trendOffset*WINDOW;
  document.getElementById('tPrev').disabled=(e-WINDOW<=0);
  document.getElementById('tNext').disabled=(trendOffset>=0);
  document.getElementById('tlegend').innerHTML=
    DM.map(m=>`<div class="li"><div class="ld" style="background:${m.color}"></div>${m.badge}</div>`).join('');
  Object.values(tCharts).forEach(c=>c&&c.destroy());
  const C=DM.map(m=>m.color),B=DM.map(m=>m.badge);
  tCharts.j=mkLine('tcJ',dates,DM.map((_,i)=>ds(B[i],win.map(d=>d.devices[i].avg_jungon),C[i])));
  tCharts.n=mkLine('tcN',dates,DM.map((_,i)=>ds(B[i],win.map(d=>d.devices[i].avg_nanbang),C[i])));
  tCharts.g=mkLine('tcG',dates,DM.map((_,i)=>ds(B[i],win.map(d=>d.devices[i].avg_geuptang),C[i])));
  tCharts.p=mkLine('tcP',dates,DM.map((_,i)=>ds(B[i],win.map(d=>d.devices[i].avg_pres),C[i])),'kgf');
}

/* ── 모달 ── */
function openModal(di,yi){
  modalDevIdx=di;modalDayIdx=(yi!==undefined)?yi:days.length-1;
  const s=days[modalDayIdx].date;
  calYear=+s.slice(0,4);calMonth=+s.slice(5,7)-1;
  renderModal();document.getElementById('modal').classList.add('show');
}
function renderModal(){
  const day=days[modalDayIdx],d=day.devices[modalDevIdx],m=DM[modalDevIdx];
  document.getElementById('mtitle').textContent=m.name;
  document.getElementById('calBtn').textContent=day.date;
  document.getElementById('dPrev').disabled=(modalDayIdx<=0);
  document.getElementById('dNext').disabled=(modalDayIdx>=days.length-1);
  document.getElementById('mkpi').innerHTML=[
    {l:'중온수 평균',v:d.avg_jungon.toFixed(1),u:'°C',s:`${d.min_jungon} ~ ${d.max_jungon}°C`},
    {l:'난방 평균',  v:d.avg_nanbang.toFixed(1),u:'°C',s:`${d.min_nanbang} ~ ${d.max_nanbang}°C`},
    {l:'급탕 평균',  v:d.avg_geuptang.toFixed(1),u:'°C',s:`${d.min_geuptang} ~ ${d.max_geuptang}°C`},
    {l:'압력 평균',  v:d.avg_pres.toFixed(2),u:'kgf',s:'공급 기준'},
  ].map(k=>`<div class="mkpi">
    <div class="ml">${k.l}</div>
    <div class="mv2" style="color:${m.color}">${k.v}<span style="font-size:11px;color:#94a3b8">${k.u}</span></div>
    <div class="ms">${k.s}</div></div>`).join('');
  Object.values(mCharts).forEach(c=>c&&c.destroy());
  mCharts.j=mkLine('mcJ',d.hours,[ds('공급',d.jungon_sup,m.color),ds('환수',d.jungon_ret,'#f87171',true)]);
  mCharts.n=mkLine('mcN',d.hours,[ds('공급',d.nanbang_sup,'#c47c0a'),ds('환수',d.nanbang_ret,'#f87171',true)]);
  mCharts.g=mkLine('mcG',d.hours,[ds('공급',d.geuptang_sup,'#0d7a50'),ds('환수',d.geuptang_ret,'#6d3fc0',true)]);
  mCharts.p=mkLine('mcP',d.hours,[ds('공급',d.pres_sup,'#6d3fc0'),ds('환수',d.pres_ret,'#c47c0a',true)],'kgf');
}
function navDate(dir){
  const ni=modalDayIdx+dir;if(ni<0||ni>=days.length)return;
  modalDayIdx=ni;const s=days[modalDayIdx].date;
  calYear=+s.slice(0,4);calMonth=+s.slice(5,7)-1;
  hideCal();renderModal();
}
function toggleCal(e){
  e.stopPropagation();
  const cp=document.getElementById('calPop');
  if(cp.classList.contains('show')){hideCal();return;}
  renderCal();cp.classList.add('show');
}
function hideCal(){document.getElementById('calPop').classList.remove('show');}
function shiftCalMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}
function renderCal(){
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${MN[calMonth]}`;
  const DD=new Set(days.map(d=>d.date));
  const sel=days[modalDayIdx].date,tod=new Date().toISOString().slice(0,10);
  const fd=new Date(calYear,calMonth,1).getDay(),ld=new Date(calYear,calMonth+1,0).getDate();
  const all=Array.from(DD).sort();
  const cur=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  document.getElementById('calPrevM').disabled=(cur<=all[0].slice(0,7));
  document.getElementById('calNextM').disabled=(cur>=all[all.length-1].slice(0,7));
  let h='';
  DOW.forEach(d=>{h+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<fd;i++) h+='<div class="cal-day"></div>';
  for(let d=1;d<=ld;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(calYear,calMonth,d).getDay(),has=DD.has(ds);
    const cls=['cal-day',has?'has-data':'',ds===sel?'selected':'',
      ds===tod?'today':'',dow===0?'sun':'',dow===6?'sat':''].filter(Boolean).join(' ');
    h+=`<div class="${cls}"${has?` onclick="selDate('${ds}')"`:''}>${d}<div class="cal-dot"></div></div>`;
  }
  document.getElementById('calGrid').innerHTML=h;
}
function selDate(ds){
  const i=days.findIndex(d=>d.date===ds);if(i<0)return;
  modalDayIdx=i;calYear=+ds.slice(0,4);calMonth=+ds.slice(5,7)-1;
  hideCal();renderModal();
}
function closeModal(){document.getElementById('modal').classList.remove('show');hideCal();}
function closeModalBg(e){if(e.target===document.getElementById('modal'))closeModal();}
document.addEventListener('click',e=>{
  const cp=document.getElementById('calPop');
  if(cp.classList.contains('show')&&!cp.contains(e.target)&&e.target.id!=='calBtn')hideCal();
});

function ds(label,data,color,dashed=false){
  return{label,data,borderColor:color,backgroundColor:color+'18',
    borderDash:dashed?[4,3]:[],fill:false};
}
function mkLine(id,labels,datasets,yU='°C'){
  const ctx=document.getElementById(id);if(!ctx)return null;
  return new Chart(ctx,{type:'line',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:datasets.length>1,labels:{boxWidth:8,padding:10,font:{size:10},color:'#4a5568'}},
      tooltip:{backgroundColor:'#1e293b',borderColor:'#334155',borderWidth:1,
        titleColor:'#f1f5f9',bodyColor:'#94a3b8',padding:10,
        callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}${yU}`}}
    },
    scales:{
      x:{grid:{color:'#f1f5f9'},ticks:{maxTicksLimit:14,color:'#64748b'}},
      y:{grid:{color:'#f1f5f9'},ticks:{callback:v=>v+yU,color:'#64748b'}}
    },
    elements:{line:{tension:.3,borderWidth:2},point:{radius:2,hoverRadius:5}}
  }});
}

renderAll();
</script>
