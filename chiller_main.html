<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>냉동기 모니터링 시스템 v4.3 (그래프 디테일 완성)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050d1a; --bg2:#081426; --panel:#0a1c35; --panel2:#0d2244;
    --border:#1a3a5c; --accent:#00c8ff; --accent2:#0088cc;
    --text:#cce8ff; --text2:#7aadcc; --text3:#3a6a8a;
    --glow:0 0 20px rgba(0,200,255,.3);
    
    --c1:#00e5ff;  --c2:#39ff6b;  --c3:#ffcc00;  --c4:#ff5fa0; 
    --c1_d:#008291; --c2_d:#229940; --c3_d:#997a00; --c4_d:#993960; 
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden;}
  
  header{position:relative;z-index:10;background:linear-gradient(180deg,#020a14,var(--bg2));border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;}
  .hdr-l{display:flex;align-items:center;gap:16px;}
  .logo{width:40px;height:40px;background:linear-gradient(135deg,#003a5c,#0088cc);border:1px solid var(--accent2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:var(--glow);}
  .hdr-title{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:1px;text-shadow:var(--glow);}
  
  #clock{font-family:'Noto Sans KR',sans-serif; font-weight:500; font-size:13px; color:var(--accent); background:rgba(0,200,255,.08); border:1px solid var(--border); border-radius:6px; padding:6px 14px;}

  .tab-nav{position:relative;z-index:10;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 24px;gap:4px;}
  .tab-btn{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);text-shadow:0 0 10px rgba(0,200,255,.5);}

  .main{position:relative;z-index:1;padding:20px 24px;max-width:1400px;margin:0 auto;}

  .upload-bar{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .up-area{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  
  .file-btn{padding:7px 16px;background:linear-gradient(135deg,#003a5c,#0066aa);border:1px solid var(--accent2);border-radius:6px;color:var(--text);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .file-btn:hover{background:linear-gradient(135deg,#004a6c,#0088cc);box-shadow:var(--glow);}
  
  .mode-toggle{display:flex;background:var(--bg2);border-radius:20px;padding:2px;border:1px solid var(--border);}
  .m-btn{width:60px; padding:5px 0; border-radius:18px; font-size:11px; border:none; background:none; color:var(--text3); cursor:pointer; transition:all .2s; text-align:center;}
  .m-btn.active{background:var(--accent);color:var(--bg);font-weight:700;}

  .date-nav{display:flex;align-items:center;gap:12px;}
  #date-disp{font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; color:var(--text); min-width:90px; text-align:center;}

  .cpanel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;}
  .cpanel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .cpanel-title{font-size:15px;color:var(--text);font-weight:700;text-shadow:var(--glow);}
  
  .cwrap{position:relative;height:550px;} 
  .cwrap-full{position:relative;height:480px;}

  .legend-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;}
  .leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;user-select:none;transition:opacity 0.2s;}
  .leg-item:hover{color:var(--text);}
  .leg-dot{width:12px;height:12px;border-radius:3px;}
  .leg-dot.dark{width:8px; height:8px; border-radius:50%; opacity: 0.8;}

  .tbl-ctrls{display:flex;gap:8px;flex-wrap:wrap;}
  .tbl-btn{padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .15s;}
  .tbl-btn.active{background:rgba(0,200,255,.15);border-color:var(--accent);color:var(--accent);}

  .tbl-wrap{background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:visible; max-height:none;}
  table{width:100%; border-collapse:collapse;}
  thead th{position:sticky; top:0; background:var(--panel2); padding:8px 4px; font-size:11px; color:var(--text); border-bottom:1px solid var(--border); white-space:nowrap;}
  tbody td{padding:6px 4px; text-align:center; font-size:12px; border-bottom:1px solid rgba(26,58,92,.5);}
  tbody tr:hover{background:rgba(0,200,255,.05);}

  .tab-view{display:none;}
  .tab-view.active{display:block;}
  footer{text-align:center;padding:16px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:20px;}

  .loading-area { display:none; align-items:center; gap:6px; color:var(--accent); font-size:11px; font-weight:700;}
  .loading-area.show { display:flex; }
  .spinner { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media(max-width:700px){
    header{padding:0 12px;height:60px;} 
    .main{padding:12px;}
    .tab-nav { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; padding: 0 12px;}
    .tab-btn { padding: 14px 16px; font-size: 13px; }
    .upload-bar { flex-direction: column; align-items: stretch; gap: 12px; padding: 14px;}
    .up-area { justify-content: space-between; width: 100%; }
    .date-nav { justify-content: space-between; width: 100%; margin-top: 4px;}
    .cwrap, .cwrap-full { height: 320px; }
  }
</style>
</head>
<body>

<header>
  <div class="hdr-l">
    <div class="logo">🧊</div>
    <div>
      <div class="hdr-title">냉동기 모니터링</div>
      <div class="hdr-sub" style="font-size:11px; color:var(--text2);">현대 테라타워 향동 방재실</div>
    </div>
  </div>
  <div id="clock">--</div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('overview',this)">📊 통합 현황</button>
  <button class="tab-btn" onclick="switchTab('table',this)">📋 데이터표</button>
</nav>

<div class="main">
  <div class="upload-bar">
    <div class="up-area">
      <div class="mode-toggle">
        <button class="m-btn active" id="mode-daily" onclick="setMode('daily')">일간</button>
        <button class="m-btn" id="mode-3days" onclick="setMode('3days')">3일간</button>
      </div>
      <button class="file-btn" style="background:linear-gradient(135deg,#00665c,#009688); border-color:#00bfa5;" onclick="loadDriveData()">🔄 데이터 동기화</button>
      <div class="loading-area" id="loading-area"><div class="spinner"></div>수신중...</div>
    </div>

    <div class="date-nav">
      <button onclick="changeDate(-1)" class="file-btn" style="padding:6px 12px;" id="prev-btn" disabled>◀</button>
      <span id="date-disp">대기중</span>
      <button onclick="changeDate(1)" class="file-btn" style="padding:6px 12px;" id="next-btn" disabled>▶</button>
    </div>
  </div>

  <div class="tab-view active" id="tab-overview">
    <div id="top-section"></div>
    <div id="bottom-section" style="margin-top: 24px;"></div>
  </div>

  <div class="tab-view" id="tab-table">
    <div class="cpanel">
      <div id="table-content"></div>
    </div>
  </div>
</div>

<footer>현대 테라타워 향동 방재실 · 냉동기 대시보드 v4.3</footer>

<script>
const GAS_URL = "
