<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>냉동기 모니터링 시스템 v4.4 (최종 완성본)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050d1a; --bg2:#081426; --panel:#0a1c35; --panel2:#0d2244;
    --border:#1a3a5c; --accent:#00c8ff; --accent2:#0088cc;
    --text:#cce8ff; --text2:#7aadcc; --text3:#3a6a8a;
    --glow:0 0 20px rgba(0,200,255,.3);
    
    --c1:#00e5ff;  --c2:#39ff6b;  --c3:#ffcc00;  --c4:#ff5fa0; 
    --c1_d:#008291; --c2_d:#229940; --c3_d:#997a00; --c4_d:#993960; 
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden;}
  
  header{position:relative;z-index:10;background:linear-gradient(180deg,#020a14,var(--bg2));border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;}
  .hdr-l{display:flex;align-items:center;gap:16px;}
  .logo{width:40px;height:40px;background:linear-gradient(135deg,#003a5c,#0088cc);border:1px solid var(--accent2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:var(--glow);}
  .hdr-title{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:1px;text-shadow:var(--glow);}
  
  #clock{font-family:'Noto Sans KR',sans-serif; font-weight:500; font-size:13px; color:var(--accent); background:rgba(0,200,255,.08); border:1px solid var(--border); border-radius:6px; padding:6px 14px;}

  .tab-nav{position:relative;z-index:10;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 24px;gap:4px;}
  .tab-btn{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);text-shadow:0 0 10px rgba(0,200,255,.5);}

  .main{position:relative;z-index:1;padding:20px 24px;max-width:1400px;margin:0 auto;}

  .upload-bar{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .up-area{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  
  .file-btn{padding:7px 16px;background:linear-gradient(135deg,#003a5c,#0066aa);border:1px solid var(--accent2);border-radius:6px;color:var(--text);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .file-btn:hover{background:linear-gradient(135deg,#004a6c,#0088cc);box-shadow:var(--glow);}
  
  .mode-toggle{display:flex;background:var(--bg2);border-radius:20px;padding:2px;border:1px solid var(--border);}
  .m-btn{width:60px; padding:5px 0; border-radius:18px; font-size:11px; border:none; background:none; color:var(--text3); cursor:pointer; transition:all .2s; text-align:center;}
  .m-btn.active{background:var(--accent);color:var(--bg);font-weight:700;}

  .date-nav{display:flex;align-items:center;gap:12px;}
  #date-disp{font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; color:var(--text); min-width:90px; text-align:center;}

  .cpanel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;}
  .cpanel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .cpanel-title{font-size:15px;color:var(--text);font-weight:700;text-shadow:var(--glow);}
  
  .cwrap{position:relative;height:550px;} 
  .cwrap-full{position:relative;height:480px;}

  .legend-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;}
  .leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;user-select:none;transition:opacity 0.2s;}
  .leg-item:hover{color:var(--text);}
  .leg-dot{width:12px;height:12px;border-radius:3px;}
  .leg-dot.dark{width:8px; height:8px; border-radius:50%; opacity: 0.8;}

  .tbl-ctrls{display:flex;gap:8px;flex-wrap:wrap;}
  .tbl-btn{padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .15s;}
  .tbl-btn.active{background:rgba(0,200,255,.15);border-color:var(--accent);color:var(--accent);}

  .tbl-wrap{background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:visible; max-height:none;}
  table{width:100%; border-collapse:collapse;}
  thead th{position:sticky; top:0; background:var(--panel2); padding:8px 4px; font-size:11px; color:var(--text); border-bottom:1px solid var(--border); white-space:nowrap;}
  tbody td{padding:6px 4px; text-align:center; font-size:12px; border-bottom:1px solid rgba(26,58,92,.5);}
  tbody tr:hover{background:rgba(0,200,255,.05);}

  .tab-view{display:none;}
  .tab-view.active{display:block;}
  footer{text-align:center;padding:16px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:20px;}

  .loading-area { display:none; align-items:center; gap:6px; color:var(--accent); font-size:11px; font-weight:700;}
  .loading-area.show { display:flex; }
  .spinner { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media(max-width:700px){
    header{padding:0 12px;height:60px;} 
    .main{padding:12px;}
    .tab-nav { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; padding: 0 12px;}
    .tab-btn { padding: 14px 16px; font-size: 13px; }
    .upload-bar { flex-direction: column; align-items: stretch; gap: 12px; padding: 14px;}
    .up-area { justify-content: space-between; width: 100%; }
    .date-nav { justify-content: space-between; width: 100%; margin-top: 4px;}
    .cwrap, .cwrap-full { height: 320px; }
  }
</style>
</head>
<body>

<header>
  <div class="hdr-l">
    <div class="logo">🧊</div>
    <div>
      <div class="hdr-title">냉동기 모니터링</div>
      <div class="hdr-sub" style="font-size:11px; color:var(--text2);">현대 테라타워 향동 방재실</div>
    </div>
  </div>
  <div id="clock">--</div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('overview',this)">📊 통합 현황</button>
  <button class="tab-btn" onclick="switchTab('table',this)">📋 데이터표</button>
</nav>

<div class="main">
  <div class="upload-bar">
    <div class="up-area">
      <div class="mode-toggle">
        <button class="m-btn active" id="mode-daily" onclick="setMode('daily')">일간</button>
        <button class="m-btn" id="mode-3days" onclick="setMode('3days')">3일간</button>
      </div>
      <button class="file-btn" style="background:linear-gradient(135deg,#00665c,#009688); border-color:#00bfa5;" onclick="loadDriveData()">🔄 데이터 동기화</button>
      <div class="loading-area" id="loading-area"><div class="spinner"></div>수신중...</div>
    </div>

    <div class="date-nav">
      <button onclick="changeDate(-1)" class="file-btn" style="padding:6px 12px;" id="prev-btn" disabled>◀</button>
      <span id="date-disp">대기중</span>
      <button onclick="changeDate(1)" class="file-btn" style="padding:6px 12px;" id="next-btn" disabled>▶</button>
    </div>
  </div>

  <div class="tab-view active" id="tab-overview">
    <div id="top-section"></div>
    <div id="bottom-section" style="margin-top: 24px;"></div>
  </div>

  <div class="tab-view" id="tab-table">
    <div class="cpanel">
      <div id="table-content"></div>
    </div>
  </div>
</div>

<footer>현대 테라타워 향동 방재실 · 냉동기 대시보드 최종본</footer>

<script>
// ★ 형님의 웹 앱 주소 (건드리지 않으셔도 됩니다)
const GAS_URL = "https://script.google.com/macros/s/AKfycbzdBN404KXgQnMbiJyr3DUyXUiXaDxd3vCkL6HDpFLjHtYpQTQEwbx3Oped1U3XJ0Qv/exec";

const CHILLERS = ['냉동기#근생','냉동기#오피스텔','냉동기#지산고','냉동기#지산저'];
const SH = ['근생','오피스텔','지산고','지산저'];

const C4 = ['#00e5ff','#39ff6b','#ffcc00','#ff5fa0'];
const C4_DARK = ['#008291','#229940','#997a00','#993960'];

let allData={}, curDate=null, sorted=[], charts={};
let currentType = 'cold';
let currentDev = '오피스텔';
let currentTableDev = '오피스텔';
let viewMode = 'daily';

function tick(){
  const n=new Date(), p=v=>String(v).padStart(2,'0');
  document.getElementById('clock').textContent=`${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())} ${p(n.getHours())}:${p(n.getMinutes())}`;
}
tick(); setInterval(tick,30000);

function setMode(mode){
  viewMode = mode;
  document.getElementById('mode-daily').classList.toggle('active', mode==='daily');
  document.getElementById('mode-3days').classList.toggle('active', mode==='3days');
  renderAll();
}

async function loadDriveData() {
  document.getElementById('loading-area').classList.add('show');
  try {
    const response = await fetch(GAS_URL);
    const files = await response.json();
    allData = {}; 
    for (let f of files) {
      const binaryStr = atob(f.data);
      const wb = XLSX.read(binaryStr, {type: 'binary'});
      const ws = wb.Sheets['Sheet1'];
      if (!ws) continue;
      const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
      const ds = f.name.match(/\d{2}-\d{2}-\d{2}/) ? `20${f.name.match(/\d{2}-\d{2}-\d{2}/)[0]}` : new Date().toISOString().slice(0,10);
      const hours=[]; const cd={};
      SH.forEach(c=>{cd[c]={중온수공급:[],중온수환수:[],냉각수공급:[],냉각수환수:[],냉수공급:[],냉수환수:[]};});
      for(let i=7; i<raw.length; i++){
        const row=raw[i]; if(!row || row[0]==null) continue;
        const timeStr = String(row[0]);
        if(timeStr.includes('최대') || timeStr.includes('최소') || timeStr.includes('평균')) continue;
        let h = typeof row[0]==='number' ? String(new Date(Math.round((row[0]-25569)*86400000)).getUTCHours()).padStart(2,'0')+':00' : row[0].toString().slice(-5);
        hours.push(h);
        SH.forEach((c,ci)=>{
          const baseIdx = 1 + ci*6;
          cd[c].중온수공급.push(row[baseIdx]);
          cd[c].중온수환수.push(row[baseIdx+1]);
          cd[c].냉각수공급.push(row[baseIdx+2]);
          cd[c].냉각수환수.push(row[baseIdx+3]);
          cd[c].냉수공급.push(row[baseIdx+4]);
          cd[c].냉수환수.push(row[baseIdx+5]);
        });
      }
      allData[ds]={hours, chillers:cd};
    }
    sorted = Object.keys(allData).sort();
    if(sorted.length > 0) {
      curDate = sorted[sorted.length-1];
      renderAll();
    }
  } catch(error) {
    console.error(error);
  } finally {
    document.getElementById('loading-area').classList.remove('show');
  }
}

window.onload = loadDriveData;

function renderAll(){
  if(!curDate) return;
  document.getElementById('date-disp').textContent = curDate;
  const idx = sorted.indexOf(curDate);
  document.getElementById('prev-btn').disabled = (idx <= 0);
  document.getElementById('next-btn').disabled = (idx >= sorted.length-1);
  renderTopCharts(currentType);
  renderBottomChart(currentDev);
  renderTable(currentTableDev);
}

function changeDate(dir){
  const idx=sorted.indexOf(curDate), ni=idx+dir;
  if(ni>=0 && ni<sorted.length){ curDate=sorted[ni]; renderAll(); }
}

function getChartOptions() {
  return {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'nearest', intersect: true }, 
    scales: {
      y: { 
        min: 0, max: 100, 
        ticks: { color: '#7aadcc' }, 
        grid: { color: 'rgba(26,58,92,0.3)' } 
      },
      x: { 
        ticks: { 
          color: '#7aadcc', 
          autoSkip: false,
          maxRotation: 0,
          callback: function(val, index) {
            const label = this.getLabelForValue(val);
            if (viewMode === 'daily') {
              return index % 3 === 0 ? label : '';
            } else {
              return index % 6 === 0 ? label : ''; 
            }
          }
        }, 
        grid: { 
          display: true, 
          drawTicks: false,
          color: function(context) {
            if (context.tick && context.tick.value !== undefined) {
              const label = context.scale.getLabelForValue(context.tick.value);
              // ★ 00:00 일 경우 무조건 선 지우기
              if (label && label.includes('00:00')) return 'transparent';
            }
            // ★ 수직선 색상 0.7 -> 0.25 로 아주 연하게 조절
            if (viewMode === 'daily') {
              return context.index % 3 === 0 ? 'rgba(0,0,0,0.25)' : 'transparent';
            } else {
              return context.index % 6 === 0 ? 'rgba(0,0,0,0.25)' : 'transparent';
            }
          },
          lineWidth: 1.5 
        } 
      }
    },
    plugins: { 
      legend: { display: false },
      tooltip: {
        enabled: viewMode === 'daily',
        callbacks: {
          title: function(context) { return context[0].label; },
          label: function(context) { return ' ' + context.dataset.label + ' : ' + (context.parsed.y !== null ? context.parsed.y : '--') + ' °C'; }
        }
      }
    }
  };
}

window.toggleTopDataset = function(groupIndex, el) {
  const isHidden = el.style.opacity === '0.3';
  el.style.opacity = isHidden ? '1' : '0.3';
  if(charts.top) {
    charts.top.getDatasetMeta(groupIndex*2).hidden = !isHidden;
    charts.top.getDatasetMeta(groupIndex*2 + 1).hidden = !isHidden;
    charts.top.update();
  }
};

window.toggleBottomDataset = function(groupIndex, el) {
  const isHidden = el.style.opacity === '0.3';
  el.style.opacity = isHidden ? '1' : '0.3';
  if(charts.bottom) {
    charts.bottom.getDatasetMeta(groupIndex*2).hidden = !isHidden;
    charts.bottom.getDatasetMeta(groupIndex*2 + 1).hidden = !isHidden;
    charts.bottom.update();
  }
};

function renderTopCharts(type){
  currentType = type;
  if(!allData[curDate]) return;
  const config = { cold: ['냉수공급', '냉수환수'], jung: ['중온수공급', '중온수환수'], cool: ['냉각수공급', '냉각수환수'] };
  const labels = [];
  const datasets = [];
  
  SH.forEach((c, i) => {
    datasets.push({ label: c + ' 공급', data: [], borderColor: C4[i], borderWidth: 1.5, tension: 0.3, pointRadius: viewMode==='daily'?1.0:0 });
    datasets.push({ label: c + ' 환수', data: [], borderColor: C4_DARK[i], borderDash: [5, 4], borderWidth: 1.0, tension: 0.3, pointRadius: viewMode==='daily'?0.5:0 });
  });
  
  if(viewMode === 'daily'){
    labels.push(...allData[curDate].hours);
    SH.forEach((c, i) => {
      datasets[i*2].data = [...allData[curDate].chillers[c][config[type][0]]];
      datasets[i*2+1].data = [...allData[curDate].chillers[c][config[type][1]]];
    });
  } else {
    const idx = sorted.indexOf(curDate);
    const threeDaysDates = sorted.slice(Math.max(0, idx-2), idx+1);
    threeDaysDates.forEach(d=>{
      allData[d].hours.forEach(h=> labels.push(`${d.slice(5)} ${h}`));
      SH.forEach((c, i) => {
        datasets[i*2].data.push(...allData[d].chillers[c][config[type][0]]);
        datasets[i*2+1].data.push(...allData[d].chillers[c][config[type][1]]);
      });
    });
  }
  let typeNameKo = (type === 'cold') ? '냉수' : (type === 'jung' ? '중온수' : '냉각수');
  document.getElementById('top-section').innerHTML = `
    <div class="cpanel">
      <div class="cpanel-hdr">
        <div class="cpanel-title" style="font-size:16px;">[${typeNameKo}] 통합 비교 현황</div>
        <div class="tbl-ctrls">
          <button class="tbl-btn ${type==='cold'?'active':''}" onclick="renderTopCharts('cold')">냉수</button>
          <button class="tbl-btn ${type==='jung'?'active':''}" onclick="renderTopCharts('jung')">중온수</button>
          <button class="tbl-btn ${type==='cool'?'active':''}" onclick="renderTopCharts('cool')">냉각수</button>
        </div>
      </div>
      <div class="legend-bar" style="font-size:11px;">
        ${SH.map((c,i)=>`<div class="leg-item" onclick="window.toggleTopDataset(${i}, this)"><div class="leg-dot" style="background:${C4[i]}"></div><div class="leg-dot dark" style="background:${C4_DARK[i]}"></div>${c}</div>`).join('')}
      </div>
      <div class="cwrap"><canvas id="topChart"></canvas></div>
    </div>`;
  if(charts.top) charts.top.destroy();
  charts.top = new Chart(document.getElementById('topChart').getContext('2d'), { type: 'line', data: { labels, datasets }, options: getChartOptions() });
}

function renderBottomChart(dev){
  currentDev = dev;
  if(!allData[curDate]) return;
  const labels = [];
  
  const pRad = viewMode==='daily'?1.0:0;
  const pRad_d = viewMode==='daily'?0.5:0;
  
  const ds_jung_sup = { label: '중온수 공급', data: [], borderColor: '#ff7a4a', borderWidth: 1.5, tension: 0.3, pointRadius: pRad };
  const ds_jung_ret = { label: '중온수 환수', data: [], borderColor: '#a64d2e', borderDash: [5, 4], borderWidth: 1.0, tension: 0.3, pointRadius: pRad_d };
  const ds_cool_sup = { label: '냉각수 공급', data: [], borderColor: '#b2ff59', borderWidth: 1.5, tension: 0.3, pointRadius: pRad };
  const ds_cool_ret = { label: '냉각수 환수', data: [], borderColor: '#7cb342', borderDash: [5, 4], borderWidth: 1.0, tension: 0.3, pointRadius: pRad_d };
  const ds_cold_sup = { label: '냉수 공급', data: [], borderColor: '#00e5ff', borderWidth: 1.5, tension: 0.3, pointRadius: pRad };
  const ds_cold_ret = { label: '냉수 환수', data: [], borderColor: '#008291', borderDash: [5, 4], borderWidth: 1.0, tension: 0.3, pointRadius: pRad_d };
  
  if(viewMode === 'daily'){
    labels.push(...allData[curDate].hours);
    ds_jung_sup.data = [...allData[curDate].chillers[dev]['중온수공급']];
    ds_jung_ret.data = [...allData[curDate].chillers[dev]['중온수환수']];
    ds_cool_sup.data = [...allData[curDate].chillers[dev]['냉각수공급']];
    ds_cool_ret.data = [...allData[curDate].chillers[dev]['냉각수환수']];
    ds_cold_sup.data = [...allData[curDate].chillers[dev]['냉수공급']];
    ds_cold_ret.data = [...allData[curDate].chillers[dev]['냉수환수']];
  } else {
    const idx = sorted.indexOf(curDate);
    const threeDaysDates = sorted.slice(Math.max(0, idx-2), idx+1);
    threeDaysDates.forEach(d=>{
      allData[d].hours.forEach(h=> labels.push(`${d.slice(5)} ${h}`));
      ds_jung_sup.data.push(...allData[d].chillers[dev]['중온수공급']);
      ds_jung_ret.data.push(...allData[d].chillers[dev]['중온수환수']);
      ds_cool_sup.data.push(...allData[d].chillers[dev]['냉각수공급']);
      ds_cool_ret.data.push(...allData[d].chillers[dev]['냉각수환수']);
      ds_cold_sup.data.push(...allData[d].chillers[dev]['냉수공급']);
      ds_cold_ret.data.push(...allData[d].chillers[dev]['냉수환수']);
    });
  }
  const datasets = [ds_jung_sup, ds_jung_ret, ds_cool_sup, ds_cool_ret, ds_cold_sup, ds_cold_ret];
  document.getElementById('bottom-section').innerHTML = `
    <div class="cpanel">
      <div class="cpanel-hdr">
        <div class="cpanel-title" style="font-size:16px;">기기별 세부 현황</div>
        <div class="tbl-ctrls">
          ${SH.map(c => `<button class="tbl-btn ${dev===c?'active':''}" onclick="renderBottomChart('${c}')">${c}</button>`).join('')}
        </div>
      </div>
      <div class="legend-bar" style="font-size:11px;">
        <div class="leg-item" onclick="toggleBottomDataset(0, this)"><div class="leg-dot" style="background:#ff7a4a"></div>중온수</div>
        <div class="leg-item" onclick="toggleBottomDataset(1, this)"><div class="leg-dot" style="background:#b2ff59"></div>냉각수</div>
        <div class="leg-item" onclick="toggleBottomDataset(2, this)"><div class="leg-dot" style="background:#00e5ff"></div>냉수</div>
      </div>
      <div class="cwrap-full"><canvas id="bottomChart"></canvas></div>
    </div>`;
  if(charts.bottom) charts.bottom.destroy();
  charts.bottom = new Chart(document.getElementById('bottomChart').getContext('2d'), { type: 'line', data: { labels, datasets }, options: getChartOptions() });
}

function renderTable(dev = currentTableDev){
  currentTableDev = dev;
  if(!allData[curDate]) return;
  const d = allData[curDate];
  const ctrlsHtml = `
    <div class="cpanel-hdr">
      <div class="cpanel-title">기기별 데이터표 (${curDate})</div>
      <div class="tbl-ctrls">
        ${SH.map(c => `<button class="tbl-btn ${dev===c?'active':''}" onclick="renderTable('${c}')">${c}</button>`).join('')}
      </div>
    </div>
  `;
  let tblHtml = `
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th rowspan="2" style="color:var(--text); border-right:1px solid rgba(26,58,92,0.8); vertical-align:middle;">시간</th>
            <th colspan="2" style="color:#00e5ff; border-right:1px solid rgba(26,58,92,0.8);">냉수</th>
            <th colspan="2" style="color:#ff7a4a; border-right:1px solid rgba(26,58,92,0.8);">중온수</th>
            <th colspan="2" style="color:#b2ff59;">냉각수</th>
          </tr>
          <tr>
            <th style="color:#00e5ff; background:#0b1e38; font-size:10px;">공급</th>
            <th style="color:#008291; background:#0b1e38; font-size:10px; border-right:1px solid rgba(26,58,92,0.8);">환수</th>
            <th style="color:#ff7a4a; background:#0b1e38; font-size:10px;">공급</th>
            <th style="color:#a64d2e; background:#0b1e38; font-size:10px; border-right:1px solid rgba(26,58,92,0.8);">환수</th>
            <th style="color:#b2ff59; background:#0b1e38; font-size:10px;">공급</th>
            <th style="color:#7cb342; background:#0b1e38; font-size:10px;">환수</th>
          </tr>
        </thead>
        <tbody>
  `;
  d.hours.forEach((h, i) => {
    const ch = d.chillers[dev];
    const val = (v) => {
      if (v === null || v === '' || v === undefined) return '--';
      if (typeof v === 'number') return Math.round(v * 10) / 10;
      return v;
    };
    tblHtml += `
      <tr>
        <td style="border-right:1px solid rgba(26,58,92,0.5);">${h}</td>
        <td style="color:#00e5ff;">${val(ch.냉수공급[i])}</td>
        <td style="color:#008291; border-right:1px solid rgba(26,58,92,0.5);">${val(ch.냉수환수[i])}</td>
        <td style="color:#ff7a4a;">${val(ch.중온수공급[i])}</td>
        <td style="color:#a64d2e; border-right:1px solid rgba(26,58,92,0.5);">${val(ch.중온수환수[i])}</td>
        <td style="color:#b2ff59;">${val(ch.냉각수공급[i])}</td>
        <td style="color:#7cb342;">${val(ch.냉각수환수[i])}</td>
      </tr>
    `;
  });
  tblHtml += `</tbody></table></div>`;
  document.getElementById('table-content').innerHTML = ctrlsHtml + tblHtml;
}

function switchTab(name, btn){
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
